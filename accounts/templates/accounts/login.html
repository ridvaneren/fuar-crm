<!doctype html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Giriş Yap | Fuar CRM</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
<div class="container py-5">
    <div class="row justify-content-center">
        <div class="col-md-5 col-lg-4">
            <div class="card shadow-sm border-0">
                <div class="card-body p-4">
                    <h3 class="mb-3">Fuar CRM</h3>
                    <p class="text-muted">Hesabınızla giriş yapın.</p>
                    <form method="post">
                        {% csrf_token %}
                        <div class="mb-3">
                            <label class="form-label">Kullanıcı adı</label>
                            {{ form.username }}
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Şifre</label>
                            {{ form.password }}
                        </div>
                        {% if form.errors %}
                            <div class="alert alert-danger py-2">Kullanıcı adı veya şifre hatalı.</div>
                        {% endif %}
                        <button class="btn btn-primary w-100">Giriş Yap</button>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
</body>
</html>
