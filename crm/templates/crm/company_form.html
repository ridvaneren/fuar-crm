{% extends 'crm/base.html' %}

{% block content %}
<h2 class="mb-3">Firma Formu</h2>
<div class="card border-0 shadow-sm">
    <div class="card-body">
        <form method="post">
            {% csrf_token %}
            <div class="row g-3">
                {% for field in form %}
                    <div class="col-md-6 {% if field.name == 'address' or field.name == 'notes' %}col-12{% endif %}">
                        <label class="form-label">{{ field.label }}</label>
                        {{ field }}
                        {% if field.errors %}
                            <div class="text-danger small mt-1">{{ field.errors|join:', ' }}</div>
                        {% endif %}
                    </div>
                {% endfor %}
            </div>
            <div class="mt-4 d-flex gap-2">
                <button class="btn btn-primary">Kaydet</button>
                <a href="{% url 'company_list' %}" class="btn btn-outline-secondary">İptal</a>
            </div>
        </form>
    </div>
</div>
{% endblock %}
