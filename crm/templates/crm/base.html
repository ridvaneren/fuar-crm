<!doctype html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Fuar CRM</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="/static/css/style.css" rel="stylesheet">
</head>
<body class="bg-light">
<nav class="navbar navbar-expand-lg navbar-dark bg-dark shadow-sm">
    <div class="container-fluid px-4">
        <a class="navbar-brand fw-semibold" href="{% url 'dashboard' %}">Fuar CRM</a>
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
            <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="navbarNav">
            <div class="navbar-nav">
                <a class="nav-link" href="{% url 'dashboard' %}">Panel</a>
                <a class="nav-link" href="{% url 'company_list' %}">Firmalar</a>
                <a class="nav-link" href="{% url 'fair_list' %}">Fuarlar</a>
                <a class="nav-link" href="{% url 'import_excel' %}">Excel İçe Aktar</a>
                <a class="nav-link" href="{% url 'export_excel' %}">Excel Dışa Aktar</a>
            </div>
            <div class="ms-auto d-flex align-items-center gap-3">
                {% if user.is_authenticated %}
                    <span class="text-white-50 small">{{ user.username }}</span>
                    <a class="btn btn-outline-light btn-sm" href="{% url 'logout' %}">Çıkış</a>
                {% endif %}
            </div>
        </div>
    </div>
</nav>

<div class="container-fluid px-4 py-4">
    {% if messages %}
        {% for message in messages %}
            <div class="alert alert-success shadow-sm">{{ message }}</div>
        {% endfor %}
    {% endif %}

    {% block content %}{% endblock %}
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
