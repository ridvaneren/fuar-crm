{% extends 'crm/base.html' %}

{% block content %}
<div class="card border-0 shadow-sm" style="max-width: 520px;">
    <div class="card-body">
        <h2 class="h4 mb-3">Firma Sil</h2>
        <p><strong>{{ object.company_name }}</strong> kaydı silinsin mi?</p>
        <form method="post">
            {% csrf_token %}
            <div class="d-flex gap-2">
                <button class="btn btn-danger">Evet, Sil</button>
                <a href="{% url 'company_list' %}" class="btn btn-outline-secondary">Vazgeç</a>
            </div>
        </form>
    </div>
</div>
{% endblock %}
